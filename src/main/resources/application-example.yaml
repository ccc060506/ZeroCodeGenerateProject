spring:
  config:
    import: 'optional:configserver:'

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ZeroCodeGenerateProject?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 5
        max-concurrency: 20
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000ms
          multiplier: 2.0
          max-interval: 10000ms
    connection-timeout: 10s

  mail:
    host: smtp.qq.com
    port: 465
    username: 你的QQ邮箱@qq.com
    password: 你的邮箱授权码
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465

# ====================== LangChain4j 配置 ======================
langchain4j:
  dashscope:
    embedding-model:
      api-key: 你的阿里云DashScope API Key
      model-name: text-embedding-v1

# ====================== 阿里云 配置 ==================
aliyun:
  dashscope:
    api-key: 你的阿里云DashScope API Key
    region: cn-beijing
    base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    accessKeyId: 你的阿里云AccessKeyId
    accessKeySecret: 你的阿里云AccessKeySecret
    bucketName: 你的OSS Bucket名称

# ====================== RAG 配置 ======================
rag:
  redis:
    index-name: "rag-embeddings"
    prefix: "rag:"
    dimension: 1536
  document:
    upload-path: ./uploads
    chunk-size: 500
    chunk-overlap: 50
  retrieval:
    top-k: 5
    similarity-threshold: 0.75

# ====================== MyBatis-Plus 配置 ======================
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.ccc.rag_system.module.**.domain.entity
  configuration:
    map-underscore-to-camel-case: true

# ====================== 其他配置 ======================
server:
  port: 8080

jwt:
  secret: 替换为你自己的JWT密钥（随机字符串即可）
  expiration: 86400000000
